name: Daily NBA Stats Ingest

on:
  schedule:
    # 7:10 AM ET = 12:10 UTC — offset from :00 to avoid stats.nba.com thundering herd
    - cron: "10 12 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed NBA teams (idempotent)
        run: python -m ingest.nba_teams

      - name: Fetch rolling player + team stats
        run: python -m ingest.nba_stats

      - name: Fetch today's schedule + Vegas odds
        if: always()  # run even if stats step failed — odds data is independent
        run: python -m ingest.nba_schedule
