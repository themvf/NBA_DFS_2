name: Capture Odds History

on:
  schedule:
    # Every 30 minutes from noon ET through 11:30 PM ET.
    - cron: "0,30 16-23,0-3 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Game date YYYY-MM-DD (default: current America/New_York date)"
        required: false
        type: string

jobs:
  capture-odds:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve target date
        run: |
          TARGET_DATE="${{ inputs.date }}"
          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE="$(TZ=America/New_York date +%F)"
          fi
          echo "TARGET_DATE=$TARGET_DATE" >> "$GITHUB_ENV"

      - name: Capture NBA odds and props history
        run: python -m ingest.nba_schedule --date "$TARGET_DATE"

      - name: Capture MLB odds history
        run: python -m ingest.mlb_schedule --date "$TARGET_DATE"
