name: Refresh MLB Stats

on:
  schedule:
    # 9:00 AM ET daily (13:00 UTC) during the regular season
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "MLB season year (e.g. 2026)"
        required: false
        type: string

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve MLB season
        run: |
          SEASON="${{ inputs.season }}"
          if [ -z "$SEASON" ]; then
            SEASON="$(date -u +%Y)"
          fi
          echo "MLB_SEASON=$SEASON" >> "$GITHUB_ENV"

      - name: Refresh MLB batter, pitcher, and team stats
        run: python -m ingest.mlb_stats --season "$MLB_SEASON"
